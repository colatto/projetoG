apiVersion: apps/v1
kind: Deployment
metadata:
  name: projetog-workers
  namespace: projetog
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: projetog-workers
  template:
    metadata:
      labels:
        app: projetog-workers
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/path: /metrics
        prometheus.io/port: '9080'
    spec:
      containers:
        - name: workers
          image: ghcr.io/example-org/example-repo-workers:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9080
              name: metrics
          envFrom:
            - configMapRef:
                name: projetog-workers-config
            - secretRef:
                name: projetog-workers-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
